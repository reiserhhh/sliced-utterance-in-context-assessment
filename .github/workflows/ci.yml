name: test

on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-lock-v0.2.0.txt
      - run: python -m compileall -q suica_core suica_sim scripts tests
      - run: python -m pytest -q -p no:cacheprovider
      - run: python scripts/verify_suica_v020_lockbox.py
