name: test

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  # Per-push job: tests plus a content-only lockbox check (no tag identity).
  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 is the audited release interpreter; 3.14 guards forward
        # compatibility of the same lock. If the lock ever fails to resolve
        # on 3.14, drop it here rather than loosening the lock.
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the sealed release tree can be checked out
          # into a worktree for the lockbox ratchet below.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-lock-v0.2.0.txt
      - run: python -m compileall -q suica_core suica_sim scripts tests
      - run: python -m pytest -q -p no:cacheprovider
      # LOCKBOX RATCHET (2026-07-17 CI policy correction): the release
      # manifest describes the SEALED RELEASE TREE, not evolving main HEAD —
      # living documents (V7_DISCOVERY_LEDGER.md and other ledgers) accumulate
      # registrations/outcomes after the release by design, so verifying the
      # working tree against the frozen manifest broke on every ledger update.
      # Instead, verify the immutable v0.2.1 tag tree in a worktree: this
      # still detects tag re-pointing to a tampered tree and manifest
      # corruption in history, without freezing main.
      - name: Verify v0.2.1 lockbox at its sealed tag tree
        run: |
          git fetch --force origin "+refs/tags/v0.2.1:refs/tags/v0.2.1"
          git worktree add "$RUNNER_TEMP/rel-v021" v0.2.1
          cd "$RUNNER_TEMP/rel-v021"
          python scripts/verify_suica_v021_lockbox.py --content-only

  # Tag-triggered job: the FULL lockbox verifier (content + release-identity
  # check, which requires the annotated tag at HEAD) plus the theory closure
  # audit. This is the gate that would have caught tag re-pointing and
  # post-freeze manifest regeneration.
  release-lockbox:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history and all tags so the annotated release tag object is
          # available for the identity check.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-lock-v0.2.0.txt
      # actions/checkout rewrites a pushed annotated tag as a LIGHTWEIGHT tag
      # pointing at the commit (checkout issue #290), which made the identity
      # check fail with tag_is_not_annotated on CI while passing locally.
      # Re-fetch the real annotated tag object before verifying.
      - name: Restore annotated tag object
        run: git fetch --force origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
      # Full verification: tracked content hashes AND release identity
      # (annotated v0.2.1 tag at HEAD carrying the manifest hash). Any future
      # v* tag whose HEAD is not the sealed release commit fails here until a
      # corresponding lockbox/verifier for that release exists — that is the
      # intended ratchet against tag re-pointing.
      - run: python scripts/verify_suica_v021_lockbox.py
      # Closure audit over the registered theoretical-closure evidence set.
      - run: >-
          python scripts/run_suica_v7_theory_closure_audit.py
          --output-dir "$RUNNER_TEMP/closure_audit"
          --report "$RUNNER_TEMP/closure_audit/V7_THEORY_CLOSURE_AUDIT.md"
